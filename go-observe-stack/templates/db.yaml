apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: registry.cn-hangzhou.aliyuncs.com/githubimage/mysql:8.0
        ports:
        - containerPort: 3306
        env:
            - name: MYSQL_ROOT_PASSWORD
              value: "123456"
            - name: MYSQL_DATABASE
              value: "myapp"

---

apiVersion: v1
kind: Service
metadata:
  name: db-service
spec:
  selector: 
    app: mysql
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306

