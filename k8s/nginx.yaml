apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx
          mountPath: "/etc/nginx/conf.d/default.conf"
          subPath: default.conf
          readOnly: true
      volumes:
        - name: nginx
          configMap:
            name: nginx

---

apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  selector: 
    app: nginx
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 80

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx
data:
  default.conf: |

    server {
      listen 80;
      location / {
        proxy_pass http://backend-service:5000;
      }
    }


